<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BM Wayfinder | Visual Pro Nav</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root { 
            --bm-red: #c0392b; --bm-blue: #2980b9; --bm-green: #27ae60; --bm-gold: #f1c40f;
            --glass: rgba(255, 255, 255, 0.98); --dark: #1a1a1a; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ffffff; }

        #landing { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; background: #000; color: white; text-align: center; }
        .btn-start { background: var(--bm-red); color: white; border: none; padding: 18px 50px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }

        #map-ui { display: none; position: fixed; inset: 0; z-index: 1000; pointer-events: none; }
        .overlay { pointer-events: auto; background: var(--glass); border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: absolute; }
        
        /* SEARCH PANEL */
        .search-panel { top: 15px; left: 10px; right: 10px; padding: 12px; border-top: 5px solid var(--dark); z-index: 4000; }
        #search-input, #destination { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 5px; font-size: 15px; font-weight: 700; }

        /* GALLERY PREVIEW CARD - UPDATED FOR IMAGES */
        #preview-card {
            position: absolute; top: -300px; left: 10px; right: 10px; height: 120px;
            background: white; border-radius: 15px; display: flex; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3500; pointer-events: auto; border: 1px solid #eee;
        }
        #preview-card.show { top: 155px; }
        
        /* Fixed image container */
        .preview-img-container { 
            width: 120px; /* Slightly wider for actual images */
            height: 100%;
            background: #eee;
            border-right: 1px solid #eee;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Actual image styling */
        #p-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This covers the area without distorting */
            transition: opacity 0.3s;
        }

        .preview-info { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .preview-info h4 { margin: 0; color: var(--dark); font-size: 1rem; font-weight: 900; }
        .preview-info p { margin: 4px 0 0; font-size: 0.75rem; color: #666; line-height: 1.3; }

        /* HUD & CONTROLS */
        #nav-hud {
            position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%);
            background: var(--dark); color: white; padding: 12px 20px; border-radius: 12px;
            font-weight: 800; text-align: center; width: 90%; display: none; z-index: 3000;
            border-bottom: 4px solid var(--bm-red);
        }

        .controls { position: absolute; right: 15px; top: 290px; display: flex; flex-direction: column; gap: 12px; pointer-events: auto; z-index: 3000; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; background: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }

        .nav-card { bottom: 20px; left: 10px; right: 10px; padding: 20px; text-align: center; z-index: 3000; }
        #meters { font-size: 3rem; font-weight: 900; color: var(--bm-red); display: block; line-height: 1; }
        
        .world-label { position: absolute; font-size: 10px; font-weight: 900; color: #fff; background: rgba(0,0,0,0.7); padding: 3px 7px; border-radius: 5px; pointer-events: none; white-space: nowrap; }
        #canvas-container { position: absolute; inset: 0; background: #ffffff; z-index: 1; }
    </style>
</head>
<body>

    <div id="landing">
        <h1 style="letter-spacing: 5px;">BRITISH MUSEUM</h1>
        <p style="font-weight: 800; opacity: 0.7;">3D VISUAL GPS NAVIGATION</p>
        <button class="btn-start" onclick="initSensors()">BEGIN NAVIGATION</button>
    </div>

    <div id="map-ui">
        <div id="preview-card">
            <div class="preview-img-container">
                <img id="p-img" src="" alt="Gallery Preview">
            </div>
            <div class="preview-info">
                <h4 id="p-title">Select Gallery</h4>
                <p id="p-desc">Pick a destination to see exhibit details and start route guidance.</p>
            </div>
        </div>

        <div id="nav-hud">NAVIGATING...</div>

        <div class="overlay search-panel">
            <input type="text" id="search-input" placeholder="🔍 Search Exhibit..." oninput="filterRooms(this.value)">
            <select id="destination" onchange="handleRoomSelect(this.value)">
                <option value="">-- Choose Destination --</option>
            </select>
        </div>

        <div class="controls">
            <button class="circle-btn" onclick="toggleVoice()" id="voice-btn">🔇</button>
            <button class="circle-btn" onclick="connectBLE()" id="ble-btn">📡</button>
        </div>

        <div class="overlay nav-card">
            <span id="meters">0</span>
            <span style="font-size: 0.75rem; font-weight: 800; color: #888; letter-spacing: 1px;">METERS TO GO</span>
            <div style="margin-top: 12px; font-size: 0.85rem; font-weight: 800; color: var(--bm-blue);">
                GPS: <span id="current-loc">STANDBY</span>
            </div>
        </div>
        <div id="label-container"></div>
    </div>

    <div id="canvas-container"></div>

        async function initSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                } catch (e) { console.error(e); }
            } else { window.addEventListener('deviceorientation', handleOrientation); }

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateUserPosition, null, { enableHighAccuracy: true });
            }
            enterMuseum();
        }

        function handleOrientation(event) {
            if (userMarker) {
                const heading = event.webkitCompassHeading || (360 - event.alpha);
                gsap.to(userMarker.rotation, { y: THREE.MathUtils.degToRad(-heading), duration: 0.1 });
            }
        }

        function updateUserPosition(position) {

            const lng = position.coords.longitude;
            if (initialLat === null) { initialLat = lat; initialLong = lng; }
            const newX = (lng - initialLong) * GPS_SENSITIVITY;
            const newZ = (lat - initialLat) * GPS_SENSITIVITY;
            if (userMarker) {
                gsap.to(userMarker.position, { x: newX, z: newZ, duration: 1.2 });
                document.getElementById('current-loc').innerText = "LIVE TRACKING";
            }
        }

        function enterMuseum() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('map-ui').style.display = 'block';
            initMap();
            populateDropdown();
        }

        function initMap() {
            scene = new THREE.Scene(); 
            scene.background = new THREE.Color(0xffffff);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
            camera.position.set(0, 1000, 800); 
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            scene.add(new THREE.GridHelper(2000, 40, 0xdddddd, 0xeeeeee));

            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(90, 30, 90), new THREE.MeshStandardMaterial({ color: r.color }));
                mesh.position.set(r.x, 15, r.z);
                scene.add(mesh);
                galleryMeshes[id] = mesh;
                
                const lbl = document.createElement('div');
                lbl.className = 'world-label'; lbl.innerText = r.name;
                document.getElementById('label-container').appendChild(lbl);
                r.domElement = lbl;
            });

            userMarker = new THREE.Group();
            userMarker.add(new THREE.Mesh(new THREE.SphereGeometry(25), new THREE.MeshPhongMaterial({ color: 0x007bff })));
            const nose = new THREE.Mesh(new THREE.ConeGeometry(12, 40, 4), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            nose.rotation.x = Math.PI/2; nose.position.z = -35;
            userMarker.add(nose);
            userMarker.position.set(0, 20, 0); 
            scene.add(userMarker);

            pathLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: 0xc0392b, linewidth: 6 }));
            scene.add(pathLine);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(selectedRoomId) {
                const target = rooms[selectedRoomId];
                const dist = userMarker.position.distanceTo(new THREE.Vector3(target.x, 0, target.z));
                document.getElementById('meters').innerText = Math.round(dist / 5);
                pathLine.geometry.setFromPoints([userMarker.position, new THREE.Vector3(target.x, 15, target.z)]);
                camera.position.lerp(new THREE.Vector3(userMarker.position.x, 1000, userMarker.position.z + 600), 0.05);
                camera.lookAt(userMarker.position);
            }
            
            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const vector = new THREE.Vector3(r.x, 70, r.z).project(camera);
                r.domElement.style.left = `${(vector.x * .5 + .5) * window.innerWidth}px`;
                r.domElement.style.top = `${(-(vector.y * .5) + .5) * window.innerHeight}px`;
            });
            renderer.render(scene, camera);
        }

        // !!! CHANGE: Updated to handle IMG source !!!
        function handleRoomSelect(id) {
            selectedRoomId = id;
            const card = document.getElementById('preview-card');
            const img = document.getElementById('p-img');
            const hud = document.getElementById('nav-hud');

            if(id && rooms[id]) {
                const r = rooms[id];
                
                // Set the image source
                img.style.opacity = 0; // Fade out current
                img.src = r.imgUrl; // Change source
                // Fade in when loaded
                img.onload = () => img.style.opacity = 1;

                document.getElementById('p-title').innerText = r.name;
                document.getElementById('p-desc').innerText = r.desc;
                card.classList.add('show');
                hud.style.display = 'block';
                hud.innerText = `GO TO ${r.name.toUpperCase()}`;
                hud.style.borderBottomColor = r.floor === "GF" ? "#c0392b" : "#2980b9";
            } else {
                card.classList.remove('show');
                hud.style.display = 'none';
            }
        }

        function populateDropdown() {
            const select = document.getElementById('destination');
            Object.keys(rooms).sort().forEach(id => {
                const opt = document.createElement('option');
                opt.value = id; opt.text = rooms[id].name;
                select.add(opt);
            });
        }

        function filterRooms(v) {
            const sel = document.getElementById('destination');
            Array.from(sel.options).forEach(opt => {
                if(opt.value) opt.style.display = opt.text.toLowerCase().includes(v.toLowerCase()) ? "block" : "none";
            });
        }

        function toggleVoice() { voiceEnabled = !voiceEnabled; document.getElementById('voice-btn').innerText = voiceEnabled ? "🔊" : "🔇"; }
        function connectBLE() { alert("Searching for Bluetooth Beacons..."); }
    </script>
</body>
