<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BM Wayfinder | Pro GPS & BLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root { 
            --bm-red: #c0392b; --bm-blue: #2980b9; --bm-green: #27ae60; --bm-gold: #f1c40f;
            --glass: rgba(255, 255, 255, 0.98); --dark: #1a1a1a; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ffffff; }

        #landing { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: #000; color: white; text-align: center; }
        .btn-start { background: var(--bm-red); color: white; border: none; padding: 18px 50px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }

        #map-ui { display: none; position: fixed; inset: 0; z-index: 1000; pointer-events: none; }
        .overlay { pointer-events: auto; background: var(--glass); border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: absolute; }
        
        .search-panel { top: 15px; left: 10px; right: 10px; padding: 12px; border-top: 5px solid var(--dark); }
        #search-input, #destination { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 5px; font-size: 15px; font-weight: 700; }

        #nav-hud {
            position: absolute; top: 175px; left: 50%; transform: translateX(-50%);
            background: var(--dark); color: white; padding: 12px 20px; border-radius: 12px;
            font-weight: 800; text-align: center; width: 90%; display: none; z-index: 1001;
            border-bottom: 4px solid var(--bm-red);
        }

        .controls { position: absolute; right: 15px; top: 175px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; background: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .active-ble { background: #2ecc71 !important; color: white !important; }

        .nav-card { bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; padding: 15px; text-align: center; }
        #meters { font-size: 2.8rem; font-weight: 900; color: var(--bm-red); display: block; line-height: 1; }
        
        #canvas-container { position: absolute; inset: 0; background: #f0f0f0; }
    </style>
</head>
<body>

    <div id="landing">
        <h1 style="letter-spacing: 5px;">BRITISH MUSEUM</h1>
        <p style="font-weight: 800; opacity: 0.7;">3D WAYFINDER: GPS + ESP32</p>
        <button class="btn-start" onclick="initApp()">ENABLE SENSORS & START</button>
    </div>

    <div id="map-ui">
        <div id="nav-hud">PLEASE SELECT A GALLERY</div>
        <div class="overlay search-panel">
            <select id="destination" onchange="handleRoomSelect(this.value)">
                <option value="">-- Navigate to --</option>
            </select>
        </div>
        
        <div class="controls">
            <button class="circle-btn" onclick="resetView()">📍</button>
            <button class="circle-btn" id="ble-btn" onclick="connectESP32()">📡</button>
        </div>

        <div class="overlay nav-card">
            <span id="meters">0</span>
            <span style="font-size: 0.7rem; font-weight: 800; color: #999;">METERS REMAINING</span>
            <div id="current-loc-display">AT: <span id="current-loc" style="color: var(--bm-blue);">GREAT COURT</span></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. CONFIGURATION & DATA ---
        let scene, camera, renderer, userMarker, pathLine;
        let initialLat = null, initialLong = null;
        let selectedRoomId = null;
        const SCALE = 10; // 1 meter in real life = 10 units in Three.js

        const COLORS = { GF: 0x333333, UF: 0x2980b9, RED: 0xc0392b };
        const rooms = {
            "4": { name: "Rosetta Stone", x: -150, z: -100, floor: "GF" },
            "18": { name: "Parthenon Sculptures", x: 200, z: -50, floor: "GF" },
            "62": { name: "Egyptian Mummies", x: 100, z: 150, floor: "UF" }
        };

        // --- 2. INITIALIZATION ---
        function initApp() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('map-ui').style.display = 'block';
            
            initThree();
            initGPS();
            populateDropdown();
            animate();
        }

        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
            camera.position.set(0, 300, 200);
            camera.lookAt(0,0,0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);

            // Grid Floor
            const grid = new THREE.GridHelper(1000, 50, 0xcccccc, 0xdddddd);
            scene.add(grid);

            // User Marker (The "You" sphere)
            const geo = new THREE.SphereGeometry(8, 32, 32);
            const mat = new THREE.MeshBasicMaterial({ color: COLORS.RED });
            userMarker = new THREE.Mesh(geo, mat);
            scene.add(userMarker);

            // Room Markers
            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const rGeo = new THREE.BoxGeometry(20, 5, 20);
                const rMat = new THREE.MeshPhongMaterial({ color: 0x2ecc71 });
                const mesh = new THREE.Mesh(rGeo, rMat);
                mesh.position.set(r.x, 2.5, r.z);
                scene.add(mesh);
            });
        }

        // --- 3. CORE FUNCTIONALITY ---
        function populateDropdown() {
            const select = document.getElementById('destination');
            Object.keys(rooms).forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.innerHTML = rooms[id].name;
                select.appendChild(opt);
            });
        }

        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;

                    if (!initialLat) { initialLat = lat; initialLong = lon; }

                    // Real-world to Three.js mapping
                    const x = (lon - initialLong) * 111320 * Math.cos(lat * Math.PI/180);
                    const z = (lat - initialLat) * 111320;

                    gsap.to(userMarker.position, { 
                        x: x * SCALE, 
                        z: -z * SCALE, 
                        duration: 1 
                    });

                    updateDistance();
                }, err => console.warn(err), { enableHighAccuracy: true });
            }
        }

        function handleRoomSelect(id) {
            selectedRoomId = id;
            if (!id) return;

            const room = rooms[id];
            document.getElementById('nav-hud').style.display = 'block';
            document.getElementById('nav-hud').innerText = `WALK TOWARDS ${room.name.toUpperCase()}`;
            
            drawPath();
        }

        function drawPath() {
            if (pathLine) scene.remove(pathLine);
            if (!selectedRoomId) return;

            const room = rooms[selectedRoomId];
            const points = [
                userMarker.position,
                new THREE.Vector3(room.x, 0, room.z)
            ];

            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineDashedMaterial({ color: 0xc0392b, dashSize: 10, gapSize: 5 });
            pathLine = new THREE.Line(geometry, material);
            pathLine.computeLineDistances();
            scene.add(pathLine);
        }

        function updateDistance() {
            if (!selectedRoomId) return;
            const room = rooms[selectedRoomId];
            const dist = userMarker.position.distanceTo(new THREE.Vector3(room.x, 0, room.z));
            document.getElementById('meters').innerText = Math.round(dist / SCALE);
            
            // Re-draw path as user moves
            drawPath();
        }

        async function connectESP32() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
                });
                const server = await device.gatt.connect();
                document.getElementById('ble-btn').classList.add('active-ble');
                alert("Connected to ESP32 Beacon");
            } catch (e) {
                console.log("BLE Cancelled or Failed");
            }
        }

        function resetView() {
            gsap.to(camera.position, { x: userMarker.position.x, z: userMarker.position.z + 150, y: 200, duration: 1.5 });
            camera.lookAt(userMarker.position);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
