<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BM Wayfinder | Full GPS & Motion Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root { 
            --bm-red: #c0392b; --bm-blue: #2980b9; --bm-green: #27ae60; --bm-gold: #333333;
            --glass: rgba(255, 255, 255, 0.98); --dark: #1a1a1a; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ffffff; }

        /* UI Overlays */
        #landing { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: #000; color: white; text-align: center; padding: 20px; }
        .btn-start { background: var(--bm-red); color: white; border: none; padding: 18px 50px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(192,57,43,0.4); }

        #map-ui { display: none; position: fixed; inset: 0; z-index: 1000; pointer-events: none; }
        .overlay { pointer-events: auto; background: var(--glass); border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: absolute; }
        
        .search-panel { top: 15px; left: 10px; right: 10px; padding: 12px; border-top: 5px solid var(--dark); }
        #destination { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; font-weight: 700; }

        #nav-hud {
            position: absolute; top: 110px; left: 50%; transform: translateX(-50%);
            background: var(--dark); color: white; padding: 12px 20px; border-radius: 12px;
            font-weight: 800; text-align: center; width: 90%; display: none; z-index: 1001;
            border-bottom: 4px solid var(--bm-red);
        }

        .controls { position: absolute; right: 15px; top: 110px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; background: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        .nav-card { bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; padding: 15px; text-align: center; }
        #meters { font-size: 2.8rem; font-weight: 900; color: var(--bm-red); display: block; line-height: 1; }
        
        .world-label { 
            position: absolute; font-size: 11px; font-weight: 900; color: #ffffff;
            background: rgba(0, 0, 0, 0.7); padding: 4px 8px; border-radius: 5px;
            pointer-events: none; transform: translate(-50%, -120%); 
            white-space: nowrap; border: 1px solid rgba(255,255,255,0.2);
            z-index: 500;
        }
        #canvas-container { position: absolute; inset: 0; background: #ffffff; }
    </style>
</head>
<body>

    <div id="landing">
        <h1 style="letter-spacing: 5px;">BRITISH MUSEUM</h1>
        <p style="font-weight: 800; opacity: 0.7;">LIVE MOTION & GPS NAVIGATION</p>
        <button class="btn-start" onclick="initExperience()">ENTER MAP</button>
        <p style="font-size: 0.7rem; margin-top: 15px; opacity: 0.4;">Requires GPS & Compass Permissions</p>
    </div>

    <div id="map-ui">
        <div id="nav-hud">PLEASE SELECT A GALLERY</div>
        <div class="overlay search-panel">
            <select id="destination" onchange="handleRoomSelect(this.value)">
                <option value="">-- Choose Destination --</option>
            </select>
        </div>

        <div class="controls">
            <button class="circle-btn" onclick="location.reload()">🔄</button>
            <button class="circle-btn" id="ble-btn" onclick="connectBLE()">📡</button>
        </div>

        <div class="overlay nav-card">
            <span id="meters">0</span>
            <span style="font-size: 0.7rem; font-weight: 800; color: #999;">METERS TO TARGET</span>
        </div>
        <div id="label-container"></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, userMarker, pathLine, pulseRing;
        let selectedRoomId = null;
        let galleryMeshes = {};

        const COLORS = { GF: 0xc0392b, UF: 0x2980b9, LF: 0x27ae60 };

        const rooms = {
            "4": { name: "Rosetta Stone", x: -280, z: -200, floor: "GF", color: COLORS.GF },
            "18": { name: "Parthenon Sculptures", x: 380, z: -120, floor: "GF", color: COLORS.GF },
            "62": { name: "Egyptian Mummies", x: 280, z: 280, floor: "UF", color: COLORS.UF },
            "25": { name: "Africa", x: 150, z: 450, floor: "LF", color: COLORS.LF }
        };

        // --- 1. SENSOR & GPS INITIALIZATION ---
        async function initExperience() {
            // Request Compass (Orientation)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') window.addEventListener('deviceorientation', handleMotion, true);
                } catch (e) { console.error("Motion Permission Denied"); }
            } else {
                window.addEventListener('deviceorientation', handleMotion, true);
            }

            // Request GPS (Geolocation)
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateGPS, (err) => console.log("GPS Lock Failed"), {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                });
            }

            // Enter UI
            document.getElementById('landing').style.display = 'none';
            document.getElementById('map-ui').style.display = 'block';
            initMap();
            populateDropdown();
        }

        // --- 2. MOTION & GPS LOGIC ---
        function handleMotion(e) {
            // Handle compass rotation (iOS & Android)
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (userMarker && heading) {
                gsap.to(userMarker.rotation, { y: THREE.MathUtils.degToRad(-heading), duration: 0.2 });
            }
        }

        function updateGPS(pos) {
            // Conversion factors for Latitude/Longitude to 3D Units
            const originLat = 51.5194; 
            const originLong = -0.1263;
            const scale = 100000; 

            const newX = (pos.coords.longitude - originLong) * scale;
            const newZ = (pos.coords.latitude - originLat) * scale;

            if (userMarker) {
                gsap.to(userMarker.position, { x: newX, z: newZ, duration: 1 });
            }
        }

        // --- 3. 3D MAP CORE ---
        function initMap() {
            scene = new THREE.Scene(); 
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
            camera.position.set(700, 900, 700); 
            camera.lookAt(0,0,0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(500, 1000, 500);
            scene.add(sun);
            scene.add(new THREE.GridHelper(2000, 40, 0xcccccc, 0xeeeeee));

            // Create Galleries
            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(90, 25, 90), new THREE.MeshStandardMaterial({ color: r.color }));
                mesh.position.set(r.x, 12.5, r.z);
                scene.add(mesh);
                galleryMeshes[id] = mesh;

                const lbl = document.createElement('div');
                lbl.className = 'world-label'; lbl.innerText = r.name;
                document.getElementById('label-container').appendChild(lbl);
                r.domElement = lbl;
            });

            // User Marker (The Moving Sphere)
            userMarker = new THREE.Group();
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(22), new THREE.MeshBasicMaterial({ color: 0x007bff }));
            const pointer = new THREE.Mesh(new THREE.ConeGeometry(10, 35, 4), new THREE.MeshBasicMaterial({ color: 0xc0392b }));
            pointer.rotation.x = Math.PI/2; pointer.position.z = -30;
            userMarker.add(sphere);
            userMarker.add(pointer);
            
            pulseRing = new THREE.Mesh(new THREE.RingGeometry(30, 45, 32), new THREE.MeshBasicMaterial({ color: 0x007bff, transparent: true, opacity: 0.5, side: THREE.DoubleSide }));
            pulseRing.rotation.x = Math.PI/2;
            userMarker.add(pulseRing);

            userMarker.position.set(0, 15, 0); 
            scene.add(userMarker);
            
            pathLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: 0xc0392b, linewidth: 5 }));
            scene.add(pathLine);

            animate();
        }

        // --- 4. NAVIGATION & DISTANCE ---
        function handleRoomSelect(id) {
            selectedRoomId = id;
            Object.values(galleryMeshes).forEach(m => m.scale.set(1,1,1));
            if(id) {
                gsap.to(galleryMeshes[id].scale, { y: 3, duration: 0.4 });
                document.getElementById('nav-hud').style.display = 'block';
                document.getElementById('nav-hud').innerText = `WALK TO ${rooms[id].name.toUpperCase()}`;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Ring Animation
            if(pulseRing) {
                pulseRing.scale.addScalar(0.015);
                pulseRing.material.opacity -= 0.01;
                if(pulseRing.scale.x > 2.5) { pulseRing.scale.set(1,1,1); pulseRing.material.opacity = 0.5; }
            }

            // Distance Logic (Recalculate every frame)
            if(selectedRoomId && userMarker) {
                const target = rooms[selectedRoomId];
                const dRaw = userMarker.position.distanceTo(new THREE.Vector3(target.x, 0, target.z));
                // Convert units to meters (approx 1 unit = 1.2m)
                document.getElementById('meters').innerText = Math.round(dRaw / 1.2);
                pathLine.geometry.setFromPoints([userMarker.position, new THREE.Vector3(target.x, 5, target.z)]);
            }

            // Label Syncing
            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const vector = new THREE.Vector3(r.x, 50, r.z).project(camera);
                r.domElement.style.left = `${(vector.x * .5 + .5) * window.innerWidth}px`;
                r.domElement.style.top = `${(-(vector.y * .5) + .5) * window.innerHeight}px`;
                r.domElement.style.display = (vector.z < 1) ? "block" : "none";
            });

            renderer.render(scene, camera);
        }

        function populateDropdown() {
            const select = document.getElementById('destination');
            Object.keys(rooms).sort().forEach(id => {
                const opt = document.createElement('option');
                opt.value = id; opt.text = rooms[id].name;
                select.add(opt);
            });
        }

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'BM-Wayfinder-Beacon' }], optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e'] });
                alert("Connected to Beacon");
            } catch(e) { alert("BLE Error: Check Browser Support"); }
        }
    </script>
</body>
</html>
