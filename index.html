<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BM Wayfinder | Live GPS Distance Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root { 
            --bm-red: #c0392b; --bm-blue: #2980b9; --bm-green: #27ae60; --bm-gold: #f1c40f;
            --glass: rgba(255, 255, 255, 0.98); --dark: #1a1a1a; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ffffff; }

        #landing { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: #000; color: white; text-align: center; }
        .btn-start { background: var(--bm-red); color: white; border: none; padding: 18px 50px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }

        #map-ui { display: none; position: fixed; inset: 0; z-index: 1000; pointer-events: none; }
        .overlay { pointer-events: auto; background: var(--glass); border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: absolute; }
        
        .search-panel { top: 15px; left: 10px; right: 10px; padding: 12px; border-top: 5px solid var(--dark); }
        #search-input, #destination { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 5px; font-size: 15px; font-weight: 700; }

        /* NEW: Gallery Preview Style */
        #gallery-preview {
            position: absolute;
            top: 175px;
            left: 15px;
            width: 120px;
            height: 120px;
            border-radius: 15px;
            background-size: cover;
            background-position: center;
            border: 4px solid white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            display: none;
            z-index: 1002;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        #nav-hud {
            position: absolute; top: 175px; left: 50%; transform: translateX(-50%);
            background: var(--dark); color: white; padding: 12px 20px; border-radius: 12px;
            font-weight: 800; text-align: center; width: 90%; display: none; z-index: 1001;
            border-bottom: 4px solid var(--bm-red);
        }

        .controls { position: absolute; right: 15px; top: 175px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; background: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .active-ble { background: #2ecc71 !important; color: white !important; }

        .nav-card { bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; padding: 15px; text-align: center; transition: background 0.5s; }
        #meters { font-size: 2.8rem; font-weight: 900; color: var(--bm-red); display: block; line-height: 1; }
        
        .floor-legend { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
        .legend-item { font-size: 0.65rem; font-weight: 900; color: white; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }

        .world-label { 
            position: absolute; font-size: 11px; font-weight: 900; color: #ffffff;
            background: rgba(0, 0, 0, 0.7); padding: 4px 8px; border-radius: 5px;
            pointer-events: none; transform: translate(-50%, -120%); 
            white-space: nowrap; border: 1px solid rgba(255,255,255,0.2);
            z-index: 500;
        }
        #canvas-container { position: absolute; inset: 0; background: #ffffff; }

        #current-loc-display { margin-top: 10px; font-size: 0.8rem; font-weight: 800; transition: all 0.3s; padding: 4px; border-radius: 4px; }
        .highlight-move { background: var(--bm-gold); color: black !important; }
        
        .arrived-state { background: var(--bm-gold) !important; border: 2px solid #000; }
        .arrived-state #meters { color: #000; }
    </style>
</head>
<body>

    <div id="landing">
        <h1 style="letter-spacing: 5px;">BRITISH MUSEUM</h1>
        <p style="font-weight: 800; opacity: 0.7;">3D GPS DISTANCE TRACKER</p>
        <button class="btn-start" onclick="initSensors()">ENABLE GPS & START</button>
    </div>

    <div id="map-ui">
        <div id="nav-hud">PLEASE SELECT A GALLERY</div>
        
        <div id="gallery-preview"></div>

        <div class="overlay search-panel">
            <input type="text" id="search-input" placeholder="🔍 Search Exhibit..." oninput="filterRooms(this.value)">
            <select id="destination" onchange="handleRoomSelect(this.value)">
                <option value="">-- Select Destination --</option>
            </select>
        </div>

        <div class="controls">
            <button class="circle-btn" onclick="toggleVoice()" id="voice-btn">🔇</button>
            <button class="circle-btn" id="ble-btn" onclick="connectBLE()">📡</button>
        </div>

        <div class="overlay nav-card" id="nav-card">
            <span id="meters">0</span>
            <span style="font-size: 0.7rem; font-weight: 800; color: #999;" id="status-label">METERS REMAINING</span>
            
            <div class="floor-legend">
                <span class="legend-item" style="background: var(--bm-red);">Ground</span>
                <span class="legend-item" style="background: var(--bm-blue);">Upper</span>
                <span class="legend-item" style="background: var(--bm-green);">Lower</span>
                <span class="legend-item" style="background: var(--bm-gold);">Lifts</span>
            </div>

            <div id="current-loc-display">
                AT: <span id="current-loc" style="color: var(--bm-blue);">GREAT COURT</span>
            </div>
        </div>
        <div id="label-container"></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, userMarker, pathLine, pulseRing;
        let selectedRoomId = null, voiceEnabled = false;
        let galleryMeshes = {};
        let hasAnnouncedArrival = false;
        
        let initialLat = null, initialLong = null;
        let liveUserPos = new THREE.Vector3(0, 15, 0); 
        const GPS_SENSITIVITY = 100000; 

        const COLORS = { GF: 0xc0392b, UF: 0x2980b9, LF: 0x27ae60, LIFT: 0x333333 };

        // Added 'img' property to each room
        const rooms = {
            "4": { name: "Rosetta Stone", x: -280, z: -200, floor: "GF", color: COLORS.GF, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2019-10/Rosetta-Stone-Room-4.jpg" },
            "18": { name: "Parthenon Sculptures", x: 380, z: -120, floor: "GF", color: COLORS.GF, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2019-10/Parthenon-Sculptures-Room-18.jpg" },
            "33": { name: "Enlightenment", x: 120, z: -380, floor: "GF", color: COLORS.GF, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2020-01/Room-33-China-South-Asia.jpg" },
            "62": { name: "Egyptian Mummies", x: 280, z: 280, floor: "UF", color: COLORS.UF, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2019-10/Egyptian-Mummies-Room-62.jpg" },
            "95": { name: "Chinese Ceramics", x: -380, z: -80, floor: "UF", color: COLORS.UF, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2019-10/Sir-Percival-David-Collection-Room-95.jpg" },
            "25": { name: "Africa", x: 150, z: 450, floor: "LF", color: COLORS.LF, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2019-10/Africa-Room-25.jpg" },
            "27": { name: "Mexico", x: -200, z: 400, floor: "LF", color: COLORS.LF, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2019-10/Mexico-Room-27.jpg" },
            "lift_north": { name: "North Lift", x: 0, z: -280, floor: "LIFT", color: COLORS.LIFT, isLift: true }
        };

        async function initSensors() {
            speak(""); 
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                } catch (e) { console.error(e); }
            } else { window.addEventListener('deviceorientation', handleOrientation); }

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateUserPosition, 
                    (err) => console.warn(err), 
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
            }
            enterMuseum();
        }

        function handleOrientation(event) {
            if (userMarker) {
                const heading = event.webkitCompassHeading || (360 - event.alpha);
                gsap.to(userMarker.rotation, { y: THREE.MathUtils.degToRad(-heading), duration: 0.1 });
            }
        }

        function updateUserPosition(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            if (initialLat === null) { initialLat = lat; initialLong = lng; }
            liveUserPos.x = (lng - initialLong) * GPS_SENSITIVITY;
            liveUserPos.z = (lat - initialLat) * GPS_SENSITIVITY;
            const display = document.getElementById('current-loc-display');
            display.classList.add('highlight-move');
            setTimeout(() => display.classList.remove('highlight-move'), 500);
        }

        function speak(text) {
            if (!voiceEnabled || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        }

        function enterMuseum() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('map-ui').style.display = 'block';
            initMap();
            populateDropdown();
        }

        function initMap() {
            scene = new THREE.Scene(); 
            scene.background = new THREE.Color(0xffffff);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
            camera.position.set(800, 1000, 800); 
            camera.lookAt(0,0,0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(500, 1000, 500);
            scene.add(sun);
            scene.add(new THREE.GridHelper(2000, 40, 0xcccccc, 0xeeeeee));

            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(90, 25, 90), new THREE.MeshStandardMaterial({ color: r.color }));
                mesh.position.set(r.x, 12.5, r.z);
                scene.add(mesh);
                galleryMeshes[id] = mesh;

                const lbl = document.createElement('div');
                lbl.className = 'world-label'; lbl.innerText = r.name;
                document.getElementById('label-container').appendChild(lbl);
                r.domElement = lbl;
            });

            userMarker = new THREE.Group();
            userMarker.add(new THREE.Mesh(new THREE.SphereGeometry(22), new THREE.MeshPhongMaterial({ color: 0x007bff })));
            const nose = new THREE.Mesh(new THREE.ConeGeometry(10, 30, 4), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            nose.rotation.x = Math.PI/2; nose.position.z = -25;
            userMarker.add(nose);
            
            pulseRing = new THREE.Mesh(new THREE.RingGeometry(30, 45, 32), new THREE.MeshBasicMaterial({ color: 0x007bff, transparent: true, opacity: 0.4, side: THREE.DoubleSide }));
            pulseRing.rotation.x = Math.PI/2;
            userMarker.add(pulseRing);

            userMarker.position.set(0, 15, 0); 
            scene.add(userMarker);
            
            pathLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: 0xc0392b, linewidth: 5 }));
            scene.add(pathLine);
            animate();
        }

        async function connectBLE() {
            const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e"; 
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BM-' }], 
                    optionalServices: [SERVICE_UUID]
                });
                alert("Connected to Beacon: " + device.name);
                document.getElementById('ble-btn').classList.add('active-ble');
            } catch(e) { alert("BLE Error: " + e.message); }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(pulseRing) {
                pulseRing.scale.addScalar(0.012);
                pulseRing.material.opacity -= 0.01;
                if(pulseRing.scale.x > 2.5) { pulseRing.scale.set(1,1,1); pulseRing.material.opacity = 0.4; }
            }
            
            if(selectedRoomId) {
                const target = rooms[selectedRoomId];
                const dist = liveUserPos.distanceTo(new THREE.Vector3(target.x, 0, target.z));
                const d = Math.round(dist / 5);
                
                document.getElementById('meters').innerText = d;
                document.getElementById('nav-hud').style.display = 'block';
                document.getElementById('nav-hud').innerText = `${target.floor} FLOOR: WALK TO ${target.name.toUpperCase()} (${d}m)`;
                
                pathLine.geometry.setFromPoints([new THREE.Vector3(0, 5, 0), new THREE.Vector3(target.x, 5, target.z)]);

                const card = document.getElementById('nav-card');
                const label = document.getElementById('status-label');

                if (d <= 10) {
                    if (!hasAnnouncedArrival) {
                        speak(`You are near your destination: the ${target.name}`);
                        hasAnnouncedArrival = true;
                    }
                    card.classList.add('arrived-state');
                    label.innerText = "YOU HAVE ARRIVED";
                } else {
                    card.classList.remove('arrived-state');
                    label.innerText = "METERS REMAINING";
                    hasAnnouncedArrival = false;
                }
            }

            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const vector = new THREE.Vector3(r.x, 50, r.z).project(camera);
                r.domElement.style.left = `${(vector.x * .5 + .5) * window.innerWidth}px`;
                r.domElement.style.top = `${(-(vector.y * .5) + .5) * window.innerHeight}px`;
                r.domElement.style.display = (vector.z < 1) ? "block" : "none";
            });
            renderer.render(scene, camera);
        }

        function handleRoomSelect(id) {
            selectedRoomId = id;
            hasAnnouncedArrival = false;
            const previewEl = document.getElementById('gallery-preview');

            if(id) {
                const target = rooms[id];
                const colorHex = target.floor === "GF" ? "#c0392b" : target.floor === "UF" ? "#2980b9" : "#27ae60";
                document.getElementById('nav-hud').style.borderBottomColor = colorHex;

                // NEW: Update Gallery Preview
                if (target.img) {
                    previewEl.style.display = 'block';
                    previewEl.style.backgroundImage = `url(${target.img})`;
                } else {
                    previewEl.style.display = 'none';
                }
            } else {
                document.getElementById('nav-hud').style.display = 'none';
                previewEl.style.display = 'none'; // Hide if nothing selected
            }
        }

        function populateDropdown() {
            const select = document.getElementById('destination');
            Object.keys(rooms).sort().forEach(id => {
                if(!rooms[id].isLift) {
                    const opt = document.createElement('option');
                    opt.value = id; opt.text = `[${rooms[id].floor}] ${rooms[id].name}`;
                    select.add(opt);
                }
            });
        }

        function filterRooms(v) {
            const sel = document.getElementById('destination');
            Array.from(sel.options).forEach(opt => {
                if(opt.value) opt.style.display = opt.text.toLowerCase().includes(v.toLowerCase()) ? "block" : "none";
            });
        }

        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            document.getElementById('voice-btn').innerText = voiceEnabled ? "🔊" : "🔇";
            if(voiceEnabled) speak("Voice guidance enabled");
        }
    </script>
</body>
</html>
