<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BM Wayfinder | Final GPS HD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root { 
            --bm-red: #c0392b; --bm-blue: #2980b9; --bm-green: #27ae60; --bm-gold: #f1c40f;
            --glass: rgba(255, 255, 255, 0.98); --dark: #1a1a1a; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ffffff; }

        #landing { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: #000; color: white; text-align: center; }
        .btn-start { background: var(--bm-red); color: white; border: none; padding: 18px 50px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(192,57,43,0.4); }

        #map-ui { display: none; position: fixed; inset: 0; z-index: 1000; pointer-events: none; }
        .overlay { pointer-events: auto; background: var(--glass); border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: absolute; }
        
        .search-panel { top: 15px; left: 10px; right: 10px; padding: 12px; border-top: 5px solid var(--dark); }
        #search-input, #destination { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 5px; font-size: 15px; font-weight: 700; }

        #nav-hud {
            position: absolute; top: 175px; left: 50%; transform: translateX(-50%);
            background: var(--dark); color: white; padding: 12px 20px; border-radius: 12px;
            font-weight: 800; text-align: center; width: 90%; display: none; z-index: 1001;
            border-bottom: 4px solid var(--bm-red);
        }

        .controls { position: absolute; right: 15px; top: 175px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; background: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        .nav-card { bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; padding: 15px; text-align: center; }
        #meters { font-size: 2.8rem; font-weight: 900; color: var(--bm-red); display: block; line-height: 1; }
        
        .floor-legend { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
        .legend-item { font-size: 0.65rem; font-weight: 900; color: white; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }

        #current-loc-box { margin-top: 10px; font-size: 0.8rem; font-weight: 800; padding: 8px; border-radius: 8px; transition: all 0.3s ease; border: 1px solid #eee; }
        .moving-highlight { background: var(--bm-gold); color: black !important; }

        .world-label { 
            position: absolute; font-size: 11px; font-weight: 900; color: #ffffff;
            background: rgba(0, 0, 0, 0.7); padding: 4px 8px; border-radius: 5px;
            pointer-events: none; transform: translate(-50%, -120%); white-space: nowrap;
        }
        #canvas-container { position: absolute; inset: 0; background: #ffffff; }
    </style>
</head>
<body>

    <div id="landing">
        <h1 style="letter-spacing: 5px;">BRITISH MUSEUM</h1>
        <p style="font-weight: 800; opacity: 0.7;">3D GPS MOTION SYNC</p>
        <button class="btn-start" onclick="initExperience()">ENABLE GPS & ENTER</button>
    </div>

    <div id="map-ui">
        <div id="nav-hud">PLEASE SELECT A GALLERY</div>
        <div class="overlay search-panel">
            <input type="text" id="search-input" placeholder="🔍 Search Exhibit..." oninput="filterRooms(this.value)">
            <select id="destination" onchange="handleRoomSelect(this.value)">
                <option value="">-- Select Destination --</option>
            </select>
        </div>
        <div class="controls">
            <button class="circle-btn" onclick="toggleVoice()" id="voice-btn">🔇</button>
            <button class="circle-btn" id="ble-btn" onclick="connectBLE()">📡</button>
        </div>
        <div class="overlay nav-card">
            <span id="meters">0</span>
            <span style="font-size: 0.7rem; font-weight: 800; color: #999;">METERS REMAINING</span>
            <div class="floor-legend">
                <span class="legend-item" style="background: var(--bm-red);">Ground</span>
                <span class="legend-item" style="background: var(--bm-blue);">Upper</span>
                <span class="legend-item" style="background: var(--bm-green);">Lower</span>
            </div>
            <div id="current-loc-box">
                STATUS: <span id="current-loc-text" style="color: var(--bm-blue);">CALIBRATING GPS...</span>
            </div>
        </div>
        <div id="label-container"></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, userMarker, pathLine, pulseRing, moveHalo;
        let selectedRoomId = null, voiceEnabled = false;
        let galleryMeshes = {};
        let initialLat = null, initialLong = null;
        const GPS_SCALE = 100000; 

        const COLORS = { GF: 0xc0392b, UF: 0x2980b9, LF: 0x27ae60, LIFT: 0x333333 };
        const rooms = {
            "4": { name: "Rosetta Stone", x: -280, z: -200, floor: "GF", color: COLORS.GF },
            "18": { name: "Parthenon Sculptures", x: 380, z: -120, floor: "GF", color: COLORS.GF },
            "62": { name: "Egyptian Mummies", x: 280, z: 280, floor: "UF", color: COLORS.UF },
            "25": { name: "Africa", x: 150, z: 450, floor: "LF", color: COLORS.LF }
        };

        // --- SENSOR START (Must be triggered by button click) ---
        async function initExperience() {
            // 1. Compass Permission (iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') window.addEventListener('deviceorientation', handleMotion, true);
                } catch (e) { console.error("Orientation access denied"); }
            } else { window.addEventListener('deviceorientation', handleMotion, true); }

            // 2. GPS Permission
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateGPS, (e) => {
                    document.getElementById('current-loc-text').innerText = "GPS Error: " + e.message;
                }, { enableHighAccuracy: true, maximumAge: 0 });
            }

            document.getElementById('landing').style.display = 'none';
            document.getElementById('map-ui').style.display = 'block';
            initMap();
            populateDropdown();
        }

        function handleMotion(e) {
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (userMarker) gsap.to(userMarker.rotation, { y: THREE.MathUtils.degToRad(-heading), duration: 0.2 });
        }

        function updateGPS(pos) {
            const lat = pos.coords.latitude;
            const long = pos.coords.longitude;

            if (initialLat === null) {
                initialLat = lat; initialLong = long;
                document.getElementById('current-loc-text').innerText = "LIVE TRACKING";
            }

            const newX = (long - initialLong) * GPS_SCALE;
            const newZ = (lat - initialLat) * GPS_SCALE;

            if (userMarker) {
                const box = document.getElementById('current-loc-box');
                box.classList.add('moving-highlight');
                setTimeout(() => box.classList.remove('moving-highlight'), 600);

                gsap.to(userMarker.position, { x: newX, z: newZ, duration: 1.2 });
                if(moveHalo) gsap.fromTo(moveHalo.scale, {x:1, y:1}, {x:1.8, y:1.8, duration: 0.4, yoyo:true, repeat:1});
            }
        }

        function initMap() {
            scene = new THREE.Scene(); 
            scene.background = new THREE.Color(0xffffff);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 5000);
            camera.position.set(700, 900, 700);
            camera.lookAt(0,0,0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            scene.add(new THREE.GridHelper(2000, 40, 0xeeeeee, 0xcccccc));

            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(90, 25, 90), new THREE.MeshStandardMaterial({ color: r.color }));
                mesh.position.set(r.x, 12.5, r.z);
                scene.add(mesh);
                galleryMeshes[id] = mesh;

                const lbl = document.createElement('div');
                lbl.className = 'world-label'; lbl.innerText = r.name;
                document.getElementById('label-container').appendChild(lbl);
                r.domElement = lbl;
            });

            // USER ELEMENT
            userMarker = new THREE.Group();
            userMarker.add(new THREE.Mesh(new THREE.SphereGeometry(25), new THREE.MeshPhongMaterial({ color: 0x007bff })));
            const nose = new THREE.Mesh(new THREE.ConeGeometry(12, 40, 4), new THREE.MeshBasicMaterial({ color: 0xc0392b }));
            nose.rotation.x = Math.PI/2; nose.position.z = -35;
            userMarker.add(nose);
            
            pulseRing = new THREE.Mesh(new THREE.RingGeometry(35, 55, 32), new THREE.MeshBasicMaterial({ color: 0x007bff, transparent: true, opacity: 0.4, side: THREE.DoubleSide }));
            pulseRing.rotation.x = Math.PI/2;
            userMarker.add(pulseRing);

            moveHalo = new THREE.Mesh(new THREE.RingGeometry(56, 65, 32), new THREE.MeshBasicMaterial({ color: 0xf1c40f, transparent: true, opacity: 0.6, side: THREE.DoubleSide }));
            moveHalo.rotation.x = Math.PI/2;
            userMarker.add(moveHalo);

            scene.add(userMarker);
            pathLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: 0xc0392b, linewidth: 5 }));
            scene.add(pathLine);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(pulseRing) {
                pulseRing.scale.addScalar(0.012);
                pulseRing.material.opacity -= 0.008;
                if(pulseRing.scale.x > 2.5) { pulseRing.scale.set(1,1,1); pulseRing.material.opacity = 0.4; }
            }
            if(selectedRoomId && userMarker) {
                const target = rooms[selectedRoomId];
                const d = Math.round(userMarker.position.distanceTo(new THREE.Vector3(target.x, 0, target.z)) / 2.5);
                document.getElementById('meters').innerText = d;
                document.getElementById('nav-hud').innerText = `${target.floor} FLOOR: WALK TO ${target.name.toUpperCase()} (${d}m)`;
                pathLine.geometry.setFromPoints([userMarker.position, new THREE.Vector3(target.x, 5, target.z)]);
            }
            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const vector = new THREE.Vector3(r.x, 60, r.z).project(camera);
                r.domElement.style.left = `${(vector.x * .5 + .5) * window.innerWidth}px`;
                r.domElement.style.top = `${(-(vector.y * .5) + .5) * window.innerHeight}px`;
            });
            renderer.render(scene, camera);
        }

        function handleRoomSelect(id) {
            selectedRoomId = id;
            document.getElementById('nav-hud').style.display = id ? 'block' : 'none';
            Object.values(galleryMeshes).forEach(m => m.scale.set(1,1,1));
            if(id) gsap.to(galleryMeshes[id].scale, { y: 3, duration: 0.4, ease: "back.out" });
        }

        function populateDropdown() {
            const select = document.getElementById('destination');
            Object.keys(rooms).sort().forEach(id => {
                const opt = document.createElement('option');
                opt.value = id; opt.text = `[${rooms[id].floor}] ${rooms[id].name}`;
                select.add(opt);
            });
        }

        function filterRooms(v) {
            const sel = document.getElementById('destination');
            Array.from(sel.options).forEach(opt => {
                if(opt.value) opt.style.display = opt.text.toLowerCase().includes(v.toLowerCase()) ? "block" : "none";
            });
        }

        function toggleVoice() { voiceEnabled = !voiceEnabled; document.getElementById('voice-btn').innerText = voiceEnabled ? "🔊" : "🔇"; }
        async function connectBLE() { alert("Searching for Beacon (Requires HTTPS + Chrome/Android)"); }
    </script>
</body>
</html>
