<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BM Wayfinder | Visual Guidance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root { 
            --bm-red: #c0392b; --bm-blue: #2980b9; --bm-green: #27ae60; --bm-gold: #f1c40f;
            --glass: rgba(255, 255, 255, 0.98); --dark: #1a1a1a; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ffffff; }

        #landing { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: #000; color: white; text-align: center; }
        .btn-start { background: var(--bm-red); color: white; border: none; padding: 18px 50px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }

        #map-ui { display: none; position: fixed; inset: 0; z-index: 1000; pointer-events: none; }
        .overlay { pointer-events: auto; background: var(--glass); border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: absolute; }
        
        .search-panel { top: 15px; left: 10px; right: 10px; padding: 12px; border-top: 5px solid var(--dark); }
        #search-input, #destination { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 5px; font-size: 15px; font-weight: 700; }

        #gallery-photo-frame {
            position: absolute; top: 175px; left: 15px; width: 120px; height: 120px;
            border-radius: 12px; border: 4px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background-size: cover; background-position: center; display: none; z-index: 1005;
        }

        #nav-hud {
            position: absolute; top: 175px; left: 145px; right: 15px;
            background: var(--dark); color: white; padding: 12px; border-radius: 12px;
            font-weight: 800; text-align: center; display: none; z-index: 1001;
            border-bottom: 4px solid var(--bm-red);
        }

        .controls { position: absolute; right: 15px; top: 310px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; background: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        .nav-card { bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; padding: 15px; text-align: center; }
        #meters { font-size: 2.8rem; font-weight: 900; color: var(--bm-red); display: block; line-height: 1; }
        
        .world-label { 
            position: absolute; font-size: 10px; font-weight: 900; color: #ffffff;
            background: rgba(0, 0, 0, 0.7); padding: 3px 6px; border-radius: 4px;
            pointer-events: none; transform: translate(-50%, -120%); white-space: nowrap;
        }
        #canvas-container { position: absolute; inset: 0; background: #fdfdfd; }
    </style>
</head>
<body>

    <div id="landing">
        <h1>BRITISH MUSEUM</h1>
        <p>3D VISUAL NAVIGATOR</p>
        <button class="btn-start" onclick="initSensors()">ENABLE GPS & START</button>
    </div>

    <div id="map-ui">
        <div id="gallery-photo-frame"></div>
        <div id="nav-hud">SELECTED GALLERY</div>

        <div class="overlay search-panel">
            <input type="text" id="search-input" placeholder="🔍 Search Gallery..." oninput="filterRooms(this.value)">
            <select id="destination" onchange="handleRoomSelect(this.value)">
                <option value="">-- Select Destination --</option>
            </select>
        </div>

        <div class="controls">
            <button class="circle-btn" onclick="toggleVoice()" id="voice-btn">🔇</button>
            <button class="circle-btn" id="ble-btn" onclick="connectBLE()">📡</button>
        </div>

        <div class="overlay nav-card" id="nav-card">
            <span id="meters">0</span>
            <span style="font-size: 0.7rem; font-weight: 800; color: #999;" id="status-label">METERS REMAINING</span>
            <div style="margin-top: 10px; font-size: 0.8rem; font-weight: 800;">
                CURRENT: <span id="current-loc" style="color: var(--bm-blue);">GREAT COURT</span>
            </div>
        </div>
        <div id="label-container"></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, userMarker, pathLine, targetBeacon;
        let selectedRoomId = null, voiceEnabled = false;
        let initialLat = null, initialLong = null;
        let liveUserPos = new THREE.Vector3(0, 15, 0); 
        const GPS_SENSITIVITY = 100000; 

        const rooms = {
            "4": { name: "Egyptian Sculpture", x: -115, z: 20, w: 50, h: 280, color: 0xc0392b, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2019-10/Rosetta-Stone-Room-4.jpg" },
            "18": { name: "Parthenon Sculptures", x: -220, z: -40, w: 90, h: 180, color: 0xc0392b, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2019-10/Parthenon-Sculptures-Room-18.jpg" },
            "33": { name: "China & South Asia", x: 145, z: -180, w: 250, h: 50, color: 0xc0392b, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2020-01/Room-33-China-South-Asia.jpg" },
            "24": { name: "Living and Dying", x: 100, z: -50, w: 65, h: 110, color: 0xc0392b, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2019-10/Africa-Room-25.jpg" },
            "1": { name: "The Enlightenment", x: 120, z: 120, w: 50, h: 220, color: 0x2980b9, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2019-10/Room-1-Enlightenment.jpg" },
            "95": { name: "Chinese Ceramics", x: 0, z: -240, w: 160, h: 55, color: 0x27ae60, img: "https://www.britishmuseum.org/sites/default/files/styles/1_1_media_small/public/2019-10/Room-95-Sir-Percival-David-Collection.jpg" },
            "reading": { name: "Reading Room", x: 0, z: 0, radius: 55, isCircle: true, color: 0xffffff }
        };

        async function initSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
            }
            window.addEventListener('deviceorientation', (e) => {
                if (userMarker) {
                    const heading = e.webkitCompassHeading || (360 - e.alpha);
                    gsap.to(userMarker.rotation, { y: THREE.MathUtils.degToRad(-heading), duration: 0.1 });
                }
            });
            navigator.geolocation.watchPosition((p) => {
                if (initialLat === null) { initialLat = p.coords.latitude; initialLong = p.coords.longitude; }
                liveUserPos.x = (p.coords.longitude - initialLong) * GPS_SENSITIVITY;
                liveUserPos.z = (p.coords.latitude - initialLat) * GPS_SENSITIVITY;
            }, null, { enableHighAccuracy: true });
            
            document.getElementById('landing').style.display = 'none';
            document.getElementById('map-ui').style.display = 'block';
            initMap();
            populateDropdown();
        }

        function initMap() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 5000);
            camera.position.set(0, 800, 400); camera.lookAt(0,0,0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            
            // Generate Museum Blocks
            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const geo = r.isCircle ? new THREE.CylinderGeometry(r.radius, r.radius, 15, 32) : new THREE.BoxGeometry(r.w, 20, r.h);
                const mat = new THREE.MeshStandardMaterial({ color: r.color, roughness: 0.7 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(r.x, 0, r.z);
                scene.add(mesh);

                const lbl = document.createElement('div');
                lbl.className = 'world-label'; lbl.innerText = r.name;
                document.getElementById('label-container').appendChild(lbl);
                r.domElement = lbl;
            });

            // Target Beacon (Glowing Column at Destination)
            const beaconGeo = new THREE.CylinderGeometry(10, 10, 2000, 32);
            const beaconMat = new THREE.MeshBasicMaterial({ color: 0xf1c40f, transparent: true, opacity: 0.3 });
            targetBeacon = new THREE.Mesh(beaconGeo, beaconMat);
            targetBeacon.visible = false;
            scene.add(targetBeacon);

            userMarker = new THREE.Group();
            userMarker.add(new THREE.Mesh(new THREE.SphereGeometry(15), new THREE.MeshPhongMaterial({ color: 0x007bff })));
            const nose = new THREE.Mesh(new THREE.ConeGeometry(8, 25, 4), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            nose.rotation.x = Math.PI/2; nose.position.z = -20;
            userMarker.add(nose);
            userMarker.position.set(0, 10, 0); scene.add(userMarker);
            
            pathLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: 0xc0392b, linewidth: 4 }));
            scene.add(pathLine);
            animate();
        }

        function handleRoomSelect(id) {
            selectedRoomId = id;
            const photoFrame = document.getElementById('gallery-photo-frame');
            const hud = document.getElementById('nav-hud');
            
            if(id && rooms[id].img) {
                photoFrame.style.backgroundImage = `url('${rooms[id].img}')`;
                photoFrame.style.display = 'block';
                hud.style.display = 'block';
                hud.innerText = "GO TO: " + rooms[id].name.toUpperCase();
                
                // Move the Beacon to the room location
                targetBeacon.position.set(rooms[id].x, 1000, rooms[id].z);
                targetBeacon.visible = true;
            } else {
                photoFrame.style.display = 'none';
                hud.style.display = 'none';
                targetBeacon.visible = false;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(selectedRoomId) {
                const target = rooms[selectedRoomId];
                const d = Math.round(liveUserPos.distanceTo(new THREE.Vector3(target.x, 0, target.z)) / 5);
                document.getElementById('meters').innerText = d + "m";
                pathLine.geometry.setFromPoints([new THREE.Vector3(0, 5, 0), new THREE.Vector3(target.x, 5, target.z)]);
                
                // Visual Pulse for Beacon
                if(targetBeacon.visible) {
                    targetBeacon.material.opacity = 0.2 + Math.sin(Date.now() * 0.005) * 0.1;
                }
            }
            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const vector = new THREE.Vector3(r.x, 30, r.z).project(camera);
                r.domElement.style.left = `${(vector.x * .5 + .5) * window.innerWidth}px`;
                r.domElement.style.top = `${(-(vector.y * .5) + .5) * window.innerHeight}px`;
            });
            renderer.render(scene, camera);
        }

        function toggleVoice() { voiceEnabled = !voiceEnabled; document.getElementById('voice-btn').innerText = voiceEnabled ? "🔊" : "🔇"; }
        function populateDropdown() {
            const select = document.getElementById('destination');
            Object.keys(rooms).forEach(id => { if(!rooms[id].isCircle) {
                const opt = document.createElement('option');
                opt.value = id; opt.text = rooms[id].name;
                select.add(opt);
            }});
        }
        function connectBLE() {}
        function filterRooms(v) {}
    </script>
</body>
</html>
